<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, sans-serif; background: #0f1218; color: #e6edf3; padding: 16px; width: 320px; }
      label { display: block; font-size: 12px; color: #7d8694; margin-bottom: 6px; }
      input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #2b3440; background: #0a0c10; color: #e6edf3; box-sizing: border-box; }
      button { margin-top: 12px; padding: 8px 12px; border-radius: 6px; border: none; background: #39d98a; color: #0a0c10; font-weight: 600; cursor: pointer; }
      .ok { margin-top: 8px; font-size: 12px; color: #39d98a; }
    </style>
  </head>
  <body>
    <label for="endpoint">LockedIn /api/track endpoint</label>
    <input id="endpoint" placeholder="http://localhost:3000/api/track" />
    <button id="save">Save</button>
    <div class="ok" id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
